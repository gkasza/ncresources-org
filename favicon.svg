<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="NC Resources logo — circular North Carolina state flag">
  <title>NC Resources</title>
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
  </defs>
  <g clip-path="url(#circle-clip)">
    <!-- right half of flag: red on top, white below -->
    <rect x="36" y="0"  width="64" height="50" fill="#CE1126" />
    <rect x="36" y="50" width="64" height="50" fill="#FFFFFF" />
    <!-- left canton: blue -->
    <rect x="0" y="0" width="36" height="100" fill="#002868" />

    <!-- gold scroll bar top (date stripe stylized) -->
    <rect x="2.5" y="14" width="31" height="3" fill="#F5B335" />
    <!-- gold scroll bar bottom -->
    <rect x="2.5" y="83" width="31" height="3" fill="#F5B335" />

    <!-- N (gold serif) -->
    <text x="3" y="62"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="24" font-weight="700"
          fill="#F5B335">N</text>

    <!-- 5-point gold star, centered in blue panel -->
    <path d="M18 41
             L20.4 47.4
             L27.2 47.7
             L21.9 51.9
             L23.7 58.5
             L18 54.7
             L12.3 58.5
             L14.1 51.9
             L8.8 47.7
             L15.6 47.4 Z"
          fill="#F5B335" />

    <!-- C (gold serif) -->
    <text x="22.5" y="62"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="24" font-weight="700"
          fill="#F5B335">C</text>

    <!-- subtle inner ring for crispness -->
    <circle cx="50" cy="50" r="49.25" fill="none" stroke="#001a4a" stroke-width="0.6" opacity="0.4" />
  </g>
</svg>
